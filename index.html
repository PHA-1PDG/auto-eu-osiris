<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AUTO.EU OSIRIS</title>
  <style>
    body {font-family: Arial, sans-serif; background:#f4f4f4; margin:0;}
    header {background:#000; color:#fff; padding:30px; text-align:center;}
    .box {background:#fff; margin:15px; padding:20px; border-radius:10px;}
    select,input,button {width:100%; padding:12px; margin-top:10px;}
    button {background:#000; color:#fff; border:none; border-radius:5px;}
    #validerPaiement:disabled {opacity:0.5;}
  </style>
</head>
<body>

<header>
<h1>AUTO.EU OSIRIS</h1>
<p>Achat sécurisé - 43% maintenant, le reste après réception</p>
</header>

<div class="box">
<h2>Catalogue</h2>
<select id="marque">
<option>Volkswagen</option>
<option>Mercedes</option>
<option>BMW</option>
</select>
<button>Voir modèles</button>
</div>

<div class="box">
<h2>Modèles</h2>
<select id="modele">
<option>C200</option>
<option>Golf 8</option>
<option>X5</option>
</select>
<button>Choisir</button>
</div>

<div class="box">
<h2>Informations Client</h2>
<input id="prenom" placeholder="Prénom">
<input id="nom" placeholder="Nom">
<input id="whatsapp" placeholder="WhatsApp">
<input placeholder="Adresse">
<input value="Bénin">
<input value="Cotonou">

<h3>Livraison obligatoire</h3>
<select>
<option>Allemagne - 500€</option>
</select>
<button onclick="passerCaisse()">Passer à la caisse</button>
</div>

<div class="box">
<h2>Paiement 43%</h2>
<p>Envoyez 43% du montant du véhicule à l'adresse BTC ci-dessous.</p>
<input value="bc1q3hmeu7w33ulkyqc2rthwfnnkfesykaj0fmnkyl" readonly>
<button onclick="copierBTC()">Copier l'adresse BTC</button>
<p>Après paiement cliquez sur Valider.</p>
<button id="validerPaiement" disabled>Valider Paiement (En attente BTC)</button>
</div>

<div class="box" id="recu" style="display:none;">
<h2>Reçu</h2>
<p id="commande"></p>
<p id="nomclient"></p>
<p id="whats"></p>
<p id="date"></p>
</div>

<script>
function copierBTC(){
 navigator.clipboard.writeText("bc1q3hmeu7w33ulkyqc2rthwfnnkfesykaj0fmnkyl");
 alert("Adresse BTC copiée");
}

function passerCaisse(){
 let cmd = "CMD-" + Math.floor(Math.random()*999999);
 document.getElementById("recu").style.display="block";
 document.getElementById("commande").innerText="Commande: "+cmd;
 document.getElementById("nomclient").innerText="Nom: "+document.getElementById("prenom").value;
 document.getElementById("whats").innerText="WhatsApp: "+document.getElementById("whatsapp").value;
 document.getElementById("date").innerText="Date: "+new Date().toLocaleString();
}
</script>

</body>
</html>
